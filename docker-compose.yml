services:
  postgres:
    image: postgres:16-alpine
    container_name: agentgate-pg
    environment:
      POSTGRES_USER: agentgate
      POSTGRES_PASSWORD: agentgate
      POSTGRES_DB: agentgate
    ports:
      - "5432:5432"
    volumes:
      - agentgate_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentgate"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: agentgate-redis
    ports:
      - "16379:6379"
    volumes:
      - agentgate_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  prometheus:
    image: prom/prometheus:latest
    container_name: agentgate-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./ops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./ops/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - agentgate_promdata:/prometheus

  grafana:
    image: grafana/grafana:latest
    container_name: agentgate-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./ops/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./ops/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - agentgate_grafanadata:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  agentgate_pgdata:
  agentgate_redisdata:
  agentgate_promdata:
  agentgate_grafanadata:
