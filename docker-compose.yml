services:
  postgres:
    image: postgres:16-alpine
    container_name: agentgate-pg
    environment:
      POSTGRES_USER: agentgate
      POSTGRES_PASSWORD: agentgate
      POSTGRES_DB: agentgate
    ports:
      - "5432:5432"
    volumes:
      - agentgate_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentgate"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: agentgate-redis
    ports:
      - "6379:6379"
    volumes:
      - agentgate_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  agentgate_pgdata:
  agentgate_redisdata:
