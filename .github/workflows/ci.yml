name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: agentgate
          POSTGRES_PASSWORD: agentgate
          POSTGRES_DB: agentgate
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U agentgate"
          --health-interval 5s --health-timeout 3s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 3s --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://agentgate:agentgate@localhost:5432/agentgate
      REDIS_URL: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]" ruff mypy
      - name: Lint (ruff)
        run: ruff check app tests
      - name: Type check (mypy)
        run: mypy app || true
      - name: Alembic migration check
        run: |
          alembic upgrade head
          alembic check
      - name: Tests
        run: pytest -q --maxfail=1

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install & build
        run: |
          if [ -f package.json ]; then
            npm ci || npm install
            npm run lint --if-present
            npm run build --if-present
          fi
